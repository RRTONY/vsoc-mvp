# ═══════════════════════════════════════════════════════════════
# VCOS — Visual Chief of Staff · Netlify Configuration
# Site: https://vsoc.netlify.app
# Owner: Tony Greenberg / RampRate · ImpactSoul
# Stack: Next.js 14 · Tailwind · @netlify/plugin-nextjs
# Last updated: 2026-03-24
# ═══════════════════════════════════════════════════════════════
# KEEP THIS FILE IN SYNC WITH EVERY PROJECT UPDATE:
#   - New API routes → already covered by /api/* wildcard header
#   - New env vars   → document in [build.environment] comments
#   - Domain change  → update ALLOWED_ORIGIN and Access-Control-Allow-Origin
# ═══════════════════════════════════════════════════════════════

# ── BUILD ──────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # REQUIRED env vars — set in Netlify UI → Site Settings → Environment Variables:
  #
  #   AUTH_SECRET              = any long random string (signs session cookies)
  #   AUTH_USERS               = tony:vcos2026:admin,ramprate:vcos2026:admin,kim:vcos2026:user,chase:vcos2026:user,rob:vcos2026:user,alex:vcos2026:user,josh:vcos2026:user,daniel:vcos2026:user,ben:vcos2026:user
  #                              Format: username:password:role
  #                              role = 'admin' (sees rates + amounts) or 'user' (rates hidden)
  #                              To add: append ,newuser:pass:user and redeploy
  #
  #   WEBWORK_API_KEY          = eyJ0eXAiOiJKV1QiLC... (JWT token from WebWork)
  #   WEBWORK_COMPANY_ID       = 301393
  #   SUPABASE_URL             = https://wfjndyzbiourateeyinw.supabase.co
  #   SUPABASE_SERVICE_KEY     = sb_secret_...
  #   CRON_SECRET              = any random string (secures scheduled function calls)
  #   CLICKUP_API_KEY          = pk_87408701_...
  #   CLICKUP_WORKSPACE_ID     = 10643959
  #   SLACK_BOT_TOKEN          = xoxb-...
  #                              Required scopes: channels:history, channels:read,
  #                              users:read, chat:write
  #   FIREFLIES_API_KEY        = d109cc2...
  #   NEXT_PUBLIC_URL          = https://vcos-ramprate.netlify.app  (no trailing slash, used by all cron functions)

# ── NEXT.JS PLUGIN ─────────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── SECURITY HEADERS (all pages) ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options  = "nosniff"
    X-Frame-Options         = "DENY"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# ── CORS — API routes ──────────────────────────────────────────
# Wildcard covers all current routes:
#   /api/auth/login
#   /api/auth/logout
#   /api/auth/signup
#   /api/slack-stats
#   /api/clickup-tasks
#   /api/weekly-reports
#   /api/systems-status
#   /api/share-slack
#   /api/share-clickup
#   /api/fireflies-meetings
#   /api/auth/me
#   /api/webwork          (pending WebWork API key)
#   /api/invoices         (pending Braintrust PDF upload feature)
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://vsoc.netlify.app/"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ── SEARCH ENGINE BLOCK ────────────────────────────────────────
# robots.txt is generated by app/robots.ts (disallows all).
# This header adds a second layer of noindex enforcement.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
