# ═══════════════════════════════════════════════════════════════
# VCOS — Visual Chief of Staff · Netlify Configuration
# Site: https://vsoc.netlify.app
# Owner: Tony Greenberg / RampRate · ImpactSoul
# Stack: Next.js 14 · Tailwind · Netlify Functions (via plugin)
# ═══════════════════════════════════════════════════════════════
# KEEP THIS FILE IN SYNC WITH EVERY PROJECT UPDATE:
#   - New API routes → add to [[headers]] if they need CORS rules
#   - New env vars   → document in [build.environment] comments
#   - Domain change  → update ALLOWED_ORIGIN and [[headers]] origin
# ═══════════════════════════════════════════════════════════════

# ── BUILD ──────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "18"
  # REQUIRED env vars — set in Netlify UI → Site Settings → Environment Variables:
  #
  #   BASIC_AUTH_USER          = ramprate
  #   BASIC_AUTH_PASSWORD      = vcos2026   (change to something strong)
  #   CLICKUP_API_KEY          = pk_87408701_...
  #   CLICKUP_WORKSPACE_ID     = 10643959
  #   SLACK_BOT_TOKEN          = xoxb-...
  #   FIREFLIES_API_KEY        = d109cc2...
  #   ALLOWED_ORIGIN           = https://vsoc.netlify.app/

# ── NEXT.JS PLUGIN ─────────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── SECURITY HEADERS (all pages) ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options  = "nosniff"
    X-Frame-Options         = "DENY"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# ── CORS — API routes ──────────────────────────────────────────
# Covers all current routes:
#   /api/slack-stats
#   /api/clickup-tasks
#   /api/weekly-reports
#   /api/systems-status
#   /api/share-slack
#   /api/share-clickup
# Add new routes here as they are created.
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://vsoc.netlify.app/"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ── SEARCH ENGINE BLOCK ────────────────────────────────────────
# robots.txt is generated by app/robots.ts (disallows all).
# This header adds a second layer of noindex enforcement.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
